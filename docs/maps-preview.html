<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DAI Maps Preview</title>
<style>
  body {
    background: #0d0a08;
    color: #ece2cc;
    font-family: "Iowan Old Style", Georgia, serif;
    margin: 0;
    padding: 20px;
  }
  h1 { color: #e6c378; margin: 0 0 16px; letter-spacing: 0.06em; }
  p.note { color: #8a7d68; margin: 0 0 20px; font-size: 13px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }
  .cell h2 {
    color: #e6c378;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  .cell svg {
    width: 100%;
    height: auto;
    border: 1px solid #3a2e22;
    display: block;
  }
</style>
</head>
<body>
<h1>DAI Maps Preview</h1>
<p class="note">Live render of every region. Reflects the current <code>js/maps.js</code> source — refresh after edits.</p>
<div id="grid" class="grid"></div>

<script src="../js/data/regions.js"></script>
<script src="../js/maps.js"></script>
<script>
  (function () {
    "use strict";
    const grid = document.getElementById("grid");
    (window.DAI_REGIONS || []).forEach(region => {
      const cell = document.createElement("div");
      cell.className = "cell";
      const h2 = document.createElement("h2");
      h2.textContent = region.name + " — " + region.act;
      cell.appendChild(h2);
      cell.insertAdjacentHTML("beforeend", window.DAI_MAPS.render(region.id, region.name));
      grid.appendChild(cell);
    });
  })();
</script>
</body>
</html>
